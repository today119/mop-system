<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>카메라 송출 — 모두의 플레이</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap');
:root{--bg:#0a0a0f;--sur:#13131e;--sur2:#1a1a28;--ac:#00e5ff;--ac2:#ff3d71;--gn:#00ff88;--tx:#eeeef5;--mu:#4a4a6a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;}

.screen{display:none;height:100dvh;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;}
.screen.show{display:flex;}

#s-setup{background:radial-gradient(ellipse at 50% 0%,#1a1a3a,var(--bg) 70%);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.3em;color:var(--mu);}
.title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--ac);letter-spacing:.08em;}
.sub{font-size:12px;color:var(--mu);}
.card{width:100%;max-width:340px;background:var(--sur2);border:1.5px solid #252535;border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--mu);}
.inp{background:#0d0d18;border:1.5px solid #252535;border-radius:10px;padding:12px 14px;font-size:16px;color:var(--tx);font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;transition:border-color .2s;}
.inp:focus{border-color:var(--ac);}
.big-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.big-btn.primary{background:var(--ac);color:#000;}
.big-btn:active{transform:scale(.97);}

/* 로딩 */
#s-loading{text-align:center;gap:14px;}
.spin{width:40px;height:40px;border:3px solid #222;border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;color:var(--mu);text-align:center;line-height:1.7;}

/* 카메라 */
#s-cam{background:#000;position:relative;}
#cam-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}

.cam-top{position:absolute;top:0;left:0;right:0;z-index:2;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);padding:16px 16px 32px;display:flex;justify-content:space-between;align-items:flex-start;}
.ct-left{display:flex;flex-direction:column;gap:2px;}
.ct-room{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.1em;}
.ct-court{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ac);line-height:1;}
.ct-name{font-size:13px;font-weight:700;}

.status-pill{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.6);border-radius:20px;padding:6px 12px;backdrop-filter:blur(8px);font-size:11px;border:1px solid rgba(255,255,255,.1);}
.sp-dot{width:7px;height:7px;border-radius:50%;}
.sp-dot.c{background:var(--ac);animation:bl .6s ease-in-out infinite alternate;}
.sp-dot.l{background:var(--gn);animation:pp 1s ease-in-out infinite alternate;}
.sp-dot.e{background:var(--ac2);}
@keyframes bl{from{opacity:.3;}to{opacity:1;}}
@keyframes pp{from{opacity:.5;}to{opacity:1;}}

.cam-bot{position:absolute;bottom:0;left:0;right:0;z-index:2;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);padding:32px 20px 28px;display:flex;justify-content:space-between;align-items:flex-end;}
.cb-score-lbl{font-size:9px;letter-spacing:.15em;color:rgba(255,255,255,.4);text-transform:uppercase;}
.cb-score-num{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;line-height:1;transition:color .15s;}
.cb-score-num.flash{color:var(--ac);}
.cam-btns{display:flex;gap:10px;}
.cam-btn{width:44px;height:44px;border:1.5px solid rgba(255,255,255,.2);border-radius:50%;background:rgba(0,0,0,.55);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cam-btn:active{transform:scale(.9);}
</style>
</head>
<body>

<!-- 설정 -->
<div class="screen show" id="s-setup">
  <div class="logo">모두의 플레이</div>
  <div class="title">카메라 송출</div>
  <div class="sub">뷰어와 같은 방 코드 입력</div>
  <div class="card">
    <div class="field">
      <label>📺 방 코드</label>
      <input class="inp" id="inp-room" type="text" placeholder="예: MOP2024"
        style="text-transform:uppercase;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em;"
        oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="field">
      <label>🏟 코트 번호 (1~12)</label>
      <input class="inp" id="inp-court" type="number" placeholder="예: 3" min="1" max="12">
    </div>
    <div class="field">
      <label>🏃 선수 이름 (선택)</label>
      <input class="inp" id="inp-name" type="text" placeholder="선수 이름">
    </div>
    <div class="field">
      <label>🌐 PeerJS 서버</label>
      <select class="inp" id="inp-server" onchange="toggleServerIP()">
        <option value="public">☁️ 공개 서버 (테스트용)</option>
        <option value="local">🏠 현장 로컬 서버 (대회 본선)</option>
      </select>
    </div>
    <div class="field" id="local-ip-wrap" style="display:none;">
      <label>📡 현장 서버 IP</label>
      <input class="inp" id="inp-server-ip" type="text" placeholder="예: 192.168.1.100" style="font-family:monospace;font-size:14px;">
    </div>
    <button class="big-btn primary" onclick="startStream()">📡 송출 시작</button>
  </div>
</div>

<!-- 로딩 -->
<div class="screen" id="s-loading">
  <div class="spin"></div>
  <div class="load-txt" id="load-txt">카메라 접근 중...</div>
</div>

<!-- 카메라 -->
<div class="screen" id="s-cam">
  <video id="cam-video" playsinline autoplay muted></video>
  <div class="cam-top">
    <div class="ct-left">
      <div class="ct-room" id="ct-room">-</div>
      <div class="ct-court" id="ct-court">C-01</div>
      <div class="ct-name" id="ct-name"></div>
    </div>
    <div class="status-pill">
      <div class="sp-dot c" id="sp-dot"></div>
      <span id="sp-txt">연결 중...</span>
    </div>
  </div>
  <div class="cam-bot">
    <div>
      <div class="cb-score-lbl">COUNT</div>
      <div class="cb-score-num" id="cb-score">0</div>
    </div>
    <div class="cam-btns">
      <div class="cam-btn" onclick="flipCam()">🔄</div>
      <div class="cam-btn" onclick="goBack()">✕</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer = null;

function toggleServerIP(){
  const v=document.getElementById('inp-server').value;
  document.getElementById('local-ip-wrap').style.display=v==='local'?'block':'none';
}
function getPeerConfig(){
  const v=document.getElementById('inp-server')?.value||'public';
  const ip=document.getElementById('inp-server-ip')?.value.trim()||'';
  if(v==='local'&&ip) return {host:ip,port:9000,path:'/',secure:false,debug:0};
  return {host:'0.peerjs.com',port:443,path:'/',secure:true,debug:0};
}
let localStream = null;
let facingMode = 'environment';
let roomCode = '', courtNo = 1, playerName = '';
let currentCall = null;
let retryTimer = null;
let dataConn = null;

const bc = new BroadcastChannel('mop-overlay');
bc.onmessage = e => {
  const {type,data} = e.data;
  if((type==='score'||type==='submit') && data.court==courtNo){
    const el = document.getElementById('cb-score');
    el.textContent = data.count||0;
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),180);
  }
};

async function startStream(){
  roomCode  = document.getElementById('inp-room').value.trim().toUpperCase();
  courtNo   = parseInt(document.getElementById('inp-court').value)||1;
  playerName= document.getElementById('inp-name').value.trim();
  if(!roomCode){ alert('방 코드를 입력하세요'); return; }
  if(courtNo<1||courtNo>12){ alert('코트 번호: 1~12'); return; }

  showScreen('s-loading');
  setLoadTxt('카메라 접근 중...');

  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:24} },
      audio:false
    });
    document.getElementById('cam-video').srcObject = localStream;
    setLoadTxt('서버 연결 중...');
    initPeer();
  }catch(e){
    alert('카메라 오류: '+e.message);
    showScreen('s-setup');
  }
}

function initPeer(){
  // 카메라 고유 ID
  const myId = `mop-${roomCode}-cam-${courtNo}`;
  if(peer){ try{peer.destroy();}catch(e){} }

  const cfg=getPeerConfig();
  peer = new Peer(myId, cfg);

  peer.on('open', id=>{
    setLoadTxt(`연결됨!\n뷰어에 연결 시도 중...`);
    showScreen('s-cam');
    document.getElementById('ct-room').textContent  = `ROOM: ${roomCode}`;
    document.getElementById('ct-court').textContent = `C-${String(courtNo).padStart(2,'0')}`;
    document.getElementById('ct-name').textContent  = playerName;
    callViewer();
  });

  peer.on('error', e=>{
    console.log('peer error:', e.type, e.message);
    if(e.type==='unavailable-id'){
      // 이미 같은 ID 사용 중 → 기존 연결 끊고 재시도
      setStatus('e','ID 충돌 재시도...');
      setTimeout(()=>initPeer(),2000);
    } else if(e.type==='peer-unavailable'){
      // 뷰어가 아직 없음 → 계속 재시도
      setStatus('c','뷰어 대기 중...');
      retryTimer = setTimeout(()=>callViewer(), 2500);
    } else {
      setStatus('e','오류: '+e.type);
      retryTimer = setTimeout(()=>initPeer(), 4000);
    }
  });

  peer.on('disconnected', ()=>{
    setStatus('c','재연결 중...');
    setTimeout(()=>{ if(peer&&!peer.destroyed) peer.reconnect(); },2000);
  });
}

function callViewer(){
  if(!peer||peer.destroyed||!localStream) return;
  clearTimeout(retryTimer);

  const viewerId = `mop-${roomCode}-viewer`;
  setStatus('c','뷰어 연결 중...');

  // 1) 영상 call
  try{
    currentCall = peer.call(viewerId, localStream, {
      metadata:{ court:courtNo, name:playerName, room:roomCode }
    });
    if(!currentCall){
      retryTimer = setTimeout(callViewer, 2500);
      return;
    }
    currentCall.on('stream', ()=>{}); // 뷰어 응답 수신 (음소거 스트림)
    currentCall.on('close', ()=>{
      setStatus('c','뷰어 재연결...');
      retryTimer = setTimeout(callViewer, 2500);
    });
    currentCall.on('error', ()=>{
      retryTimer = setTimeout(callViewer, 2500);
    });
  }catch(e){
    retryTimer = setTimeout(callViewer, 2500);
  }

  // 2) 데이터 연결 (메타 전송)
  try{
    dataConn = peer.connect(viewerId, {reliable:true, metadata:{court:courtNo}});
    dataConn.on('open',()=>{
      dataConn.send({type:'info', court:courtNo, name:playerName, room:roomCode});
      setStatus('l','LIVE 송출 중');
    });
    dataConn.on('error',()=>{});
  }catch(e){}
}

function setStatus(state, txt){
  const d=document.getElementById('sp-dot');
  document.getElementById('sp-txt').textContent=txt;
  d.className='sp-dot '+state;
}
function setLoadTxt(t){ document.getElementById('load-txt').textContent=t; }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show')); document.getElementById(id).classList.add('show'); }

async function flipCam(){
  facingMode = facingMode==='environment'?'user':'environment';
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  try{
    localStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode,width:{ideal:1280},height:{ideal:720}},audio:false
    });
    document.getElementById('cam-video').srcObject=localStream;
    if(currentCall){ currentCall.close(); }
    callViewer();
  }catch(e){}
}

function goBack(){
  clearTimeout(retryTimer);
  if(currentCall) currentCall.close();
  if(dataConn) dataConn.close();
  if(peer){ try{peer.destroy();}catch(e){} peer=null; }
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  showScreen('s-setup');
}
</script>
</body>
</html>
